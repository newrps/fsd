[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
# probe-rs 가 설치되어 있어야 한다 (`cargo install probe-rs --features cli`).
# NUCLEO-H753ZI 의 ST-LINK 가 자동 감지된다.
runner = "probe-rs run --chip STM32H753ZITx"
rustflags = [
    "-C", "link-arg=--nmagic",
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
]

[env]
DEFMT_LOG = "info"
